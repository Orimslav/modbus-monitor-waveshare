<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modbus IO Monitor & Control — Waveshare RTU IO 8CH</title>
<style>
  body { background:#111; display:flex; flex-direction:column; align-items:center; padding:0; font-family:'Segoe UI',sans-serif; }
  .container { width:100%; max-width:960px; padding:20px; }
  @keyframes pwrok { 0%,100%{opacity:1} 50%{opacity:.5} }
  @keyframes work  { 0%,33%{opacity:1} 34%,66%{opacity:.1} 67%,100%{opacity:1} }
  @keyframes rxb   { 0%,49%{opacity:.15} 50%,100%{opacity:1} }
  @keyframes txb   { 0%,39%{opacity:.15} 40%,79%{opacity:1} 80%,100%{opacity:.15} }
  @keyframes flow  { to { stroke-dashoffset: -20; } }
  .ap{animation:pwrok 2.5s ease-in-out infinite;} .aw{animation:work 1.0s linear infinite;}
  .ar{animation:rxb 0.6s linear infinite;} .at{animation:txb 0.9s linear infinite;}
  .f1{stroke-dasharray:6 4;animation:flow 1.0s linear infinite;}
  .f2{stroke-dasharray:6 4;animation:flow 1.4s linear infinite;}
  *{box-sizing:border-box;margin:0;padding:0;}
  .app-win{border:1.5px solid #555;border-radius:6px;overflow:hidden;font-family:'Segoe UI',sans-serif;font-size:12px;background:#1e1e2e;margin-bottom:10px;}
  .titlebar{background:#2d2d3f;padding:5px 10px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #444;}
  .titlebar span{font-size:11px;color:#aaa;flex:1;}
  .win-btn{width:11px;height:11px;border-radius:50%;border:none;cursor:pointer;}
  .win-close{background:#e74c3c;}.win-min{background:#f1c40f;}.win-max{background:#2ecc71;}
  .conn-bar{background:#252535;border:1px solid #444;border-radius:4px;margin:8px;padding:5px 10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .conn-bar label{color:#aaa;font-size:11px;}
  .conn-bar input{background:#1a1a2a;border:1px solid #555;border-radius:3px;color:#ddd;font-size:11px;padding:2px 5px;width:88px;}
  .conn-bar input.sm{width:42px;}
  .btn-connect{background:#2980b9;color:#fff;border:none;border-radius:4px;padding:4px 12px;font-size:11px;cursor:pointer;font-weight:500;}
  .status-dot{width:8px;height:8px;border-radius:50%;background:#27ae60;display:inline-block;margin-right:3px;}
  .status-txt{color:#27ae60;font-size:11px;}
  .panels{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 8px 8px;}
  .panel{border:1px solid #444;border-radius:4px;padding:5px 7px;background:#252535;}
  .panel-title{font-size:9.5px;color:#888;margin-bottom:5px;padding-bottom:3px;border-bottom:1px solid #333;}
  .ch-row{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
  .ch-label{color:#aaa;font-size:10px;width:26px;}
  .led-sq{width:13px;height:13px;border-radius:2px;background:#333;border:1px solid #555;transition:background 0.2s;}
  .led-sq.on{background:#27ae60!important;border-color:#1a7040!important;}
  .state-txt{color:#666;font-size:10px;width:20px;}
  .state-txt.on{color:#27ae60;}
  .btn-on{color:#fff;border:none;border-radius:3px;padding:2px 6px;font-size:9.5px;cursor:pointer;font-weight:500;opacity:0.4;}
  .btn-off{background:#555;color:#fff;border:none;border-radius:3px;padding:2px 6px;font-size:9.5px;cursor:pointer;font-weight:500;}
  .btn-on:hover,.btn-off:hover{opacity:.85!important;}
  .footer{text-align:center;color:#444;font-size:10px;margin-top:8px;font-family:monospace;}
  /* Top bar */
  .topbar{width:100%;background:#1e1e2e;border-bottom:1px solid #333;display:flex;align-items:center;justify-content:space-between;padding:10px 24px;margin-bottom:20px;}
  .topbar-logo{display:flex;align-items:center;gap:10px;}
  .topbar-logo img{height:28px;width:auto;}
  .topbar-logo span{font-size:11px;color:#555;font-family:monospace;}
  .lang-switcher{display:flex;gap:6px;}
  .lang-btn{background:none;border:1.5px solid #444;border-radius:4px;cursor:pointer;padding:3px 6px;display:flex;align-items:center;gap:5px;font-size:11px;color:#888;transition:border-color 0.15s,color 0.15s;}
  .lang-btn:hover{border-color:#777;color:#ccc;}
  .lang-btn.active{border-color:#2980b9;color:#ccc;}
  .lang-btn img{width:20px;height:14px;object-fit:cover;border-radius:2px;}
</style>

<div class="topbar">

    <img src="img/orimslav_logo.png" alt="Orimslav logo">

  </div>
  <div class="lang-switcher">

    <button class="lang-btn" id="btn-en" onclick="setLang('en')">

</div>

    </div>
  </div>
</div>

<div class="footer" data-sk="Waveshare Modbus RTU IO 8CH · Interaktívne demo · Orimslav/modbus-monitor-waveshare" data-en="Waveshare Modbus RTU IO 8CH · Interactive Demo · Orimslav/modbus-monitor-waveshare">Waveshare Modbus RTU IO 8CH · Interactive Demo · Orimslav/modbus-monitor-waveshare</div>

<script>
const DO_COLORS={1:'#e6d700',2:'#cc44cc',3:'#00cccc',4:'#e67300',5:'#4444ff',6:'#e74c3c',7:'#27ae60',8:'#3498db'};
const DO_OFF={1:'#1a1a0a',2:'#1a0a1a',3:'#0a1a1a',4:'#1a0a0a',5:'#0a0a1a',6:'#1a0a0a',7:'#0a1a0a',8:'#0a0a1a'};
function setModuleLed(id,on,color){const el=document.getElementById(id);if(!el)return;el.style.fill=on?color:'#1a3a1a';el.style.stroke=on?'#1a7040':'#0d1f0d';el.style.filter=on?'drop-shadow(0 0 4px '+color+')':'none';}
function setDoLight(ch,on){const el=document.getElementById('light-do'+ch);if(!el)return;el.style.fill=on?DO_COLORS[ch]:DO_OFF[ch];el.style.filter=on?'drop-shadow(0 0 8px '+DO_COLORS[ch]+')':'none';}
const LANG_STATE={};
function t(sk,en){return(localStorage.getItem('lang')||'sk')==='sk'?sk:en;}
function toggleDO(ch,on){setModuleLed('m-do'+ch,on,DO_COLORS[ch]);setDoLight(ch,on);const ls=document.getElementById('do-led-'+ch),st=document.getElementById('do-txt-'+ch),b1=document.getElementById('do-on-'+ch),b2=document.getElementById('do-off-'+ch);if(ls){if(on){ls.classList.add('on');ls.style.background=DO_COLORS[ch];}else{ls.classList.remove('on');ls.style.background='';}}if(st){st.textContent=on?'ON':'OFF';st.classList.toggle('on',on);}if(b1)b1.style.opacity=on?'1':'0.4';if(b2)b2.style.opacity=on?'0.4':'1';}
const diState={};
function pressDI(ch){diState[ch]=!diState[ch];const on=diState[ch];setModuleLed('m-di'+ch,on,'#27ae60');const f=document.getElementById('btn-di'+ch+'-face');if(f){f.style.fill=on?'#27ae60':'#3d5166';f.style.stroke=on?'#1a7040':'#5d7080';}const ls=document.getElementById('di-led-'+ch),st=document.getElementById('di-txt-'+ch);if(ls){if(on){ls.classList.add('on');ls.style.background='';}else{ls.classList.remove('on');ls.style.background='';}}if(st){st.textContent=on?'ON':'OFF';st.classList.toggle('on',on);}}
function buildDI(){const div=document.getElementById('di-rows');div.innerHTML='';for(let i=1;i<=8;i++){const r=document.createElement('div');r.className='ch-row';r.innerHTML=`<span class="ch-label">DI ${i}</span><div class="led-sq" id="di-led-${i}"></div><span class="state-txt" id="di-txt-${i}">OFF</span>`;div.appendChild(r);}}
function buildDO(){const div=document.getElementById('do-rows');div.innerHTML='';for(let i=1;i<=8;i++){const r=document.createElement('div');r.className='ch-row';const dot=`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${DO_COLORS[i]};margin-left:2px;"></span>`;r.innerHTML=`<span class="ch-label">DO ${i}</span><div class="led-sq" id="do-led-${i}"></div><span class="state-txt" id="do-txt-${i}">OFF</span><button class="btn-on" id="do-on-${i}" style="background:${DO_COLORS[i]}" onclick="toggleDO(${i},true)">ON</button><button class="btn-off" id="do-off-${i}" onclick="toggleDO(${i},false)">OFF</button>${dot}`;div.appendChild(r);}}
function setLang(lang){
  localStorage.setItem('lang',lang);
  document.documentElement.lang=lang;
  document.querySelectorAll('[data-sk][data-en]').forEach(el=>{
    const val=el.getAttribute('data-'+lang);
    if(val!==null) el.innerHTML=val;
  });
  document.getElementById('btn-sk').classList.toggle('active',lang==='sk');
  document.getElementById('btn-en').classList.toggle('active',lang==='en');
  // Rebuild panels to restore DO state
  const doStates={};for(let i=1;i<=8;i++){const b=document.getElementById('do-on-'+i);doStates[i]=b&&b.style.opacity==='1';}
  const diStates={};for(let i=1;i<=8;i++){const l=document.getElementById('di-led-'+i);diStates[i]=l&&l.classList.contains('on');}
  buildDI();buildDO();
  for(let i=1;i<=8;i++){setModuleLed('m-do'+i,false,DO_COLORS[i]);setModuleLed('m-di'+i,false,'#27ae60');}
  for(let i=1;i<=8;i++){if(doStates[i])toggleDO(i,true);}
  for(let i=1;i<=8;i++){if(diStates[i])pressDI(i);}
}
buildDI();buildDO();
for(let i=1;i<=8;i++){setModuleLed('m-do'+i,false,DO_COLORS[i]);setModuleLed('m-di'+i,false,'#27ae60');}
setLang(localStorage.getItem('lang')||'sk');
</script>
