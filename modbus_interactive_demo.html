<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modbus IO Monitor & Control — Waveshare RTU IO 8CH</title>
<style>
  body { background:#111; display:flex; justify-content:center; padding:20px; font-family:'Segoe UI',sans-serif; }
  .container { width:100%; max-width:900px; }
  @keyframes pwrok   { 0%,100%{opacity:1} 50%{opacity:.5} }
  @keyframes work    { 0%,33%{opacity:1} 34%,66%{opacity:.1} 67%,100%{opacity:1} }
  @keyframes rxb     { 0%,49%{opacity:.15} 50%,100%{opacity:1} }
  @keyframes txb     { 0%,39%{opacity:.15} 40%,79%{opacity:1} 80%,100%{opacity:.15} }
  @keyframes flow    { to { stroke-dashoffset: -20; } }
  .ap  { animation: pwrok 2.5s ease-in-out infinite; }
  .aw  { animation: work  1.0s linear infinite; }
  .ar  { animation: rxb   0.6s linear infinite; }
  .at  { animation: txb   0.9s linear infinite; }
  .f1  { stroke-dasharray:6 4; animation: flow 1.0s linear infinite; }
  .f2  { stroke-dasharray:6 4; animation: flow 1.4s linear infinite; }
  * { box-sizing:border-box; margin:0; padding:0; }
  .app-win { border:1.5px solid #555; border-radius:6px; overflow:hidden; font-size:12px; background:#1e1e2e; margin-bottom:10px; }
  .titlebar { background:#2d2d3f; padding:5px 10px; display:flex; align-items:center; gap:8px; border-bottom:1px solid #444; }
  .titlebar span { font-size:11px; color:#aaa; flex:1; }
  .win-btn { width:11px; height:11px; border-radius:50%; border:none; cursor:pointer; }
  .win-close{background:#e74c3c;} .win-min{background:#f1c40f;} .win-max{background:#2ecc71;}
  .conn-bar { background:#252535; border:1px solid #444; border-radius:4px; margin:8px; padding:5px 10px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .conn-bar label { color:#aaa; font-size:11px; }
  .conn-bar input { background:#1a1a2a; border:1px solid #555; border-radius:3px; color:#ddd; font-size:11px; padding:2px 5px; width:88px; }
  .conn-bar input.sm { width:42px; }
  .btn-connect { background:#2980b9; color:#fff; border:none; border-radius:4px; padding:4px 12px; font-size:11px; cursor:pointer; font-weight:500; }
  .status-dot { width:8px; height:8px; border-radius:50%; background:#27ae60; display:inline-block; margin-right:3px; }
  .status-txt { color:#27ae60; font-size:11px; }
  .panels { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:0 8px 8px; }
  .panel { border:1px solid #444; border-radius:4px; padding:5px 7px; background:#252535; }
  .panel-title { font-size:9.5px; color:#888; margin-bottom:5px; padding-bottom:3px; border-bottom:1px solid #333; }
  .ch-row { display:flex; align-items:center; gap:5px; margin-bottom:3px; }
  .ch-label { color:#aaa; font-size:10px; width:26px; }
  .led-sq { width:13px; height:13px; border-radius:2px; background:#333; border:1px solid #555; transition:background 0.2s; }
  .led-sq.on { background:#27ae60; border-color:#1a7040; }
  .state-txt { color:#666; font-size:10px; width:20px; }
  .state-txt.on { color:#27ae60; }
  .btn-on  { background:#27ae60; color:#fff; border:none; border-radius:3px; padding:2px 6px; font-size:9.5px; cursor:pointer; font-weight:500; opacity:0.4; }
  .btn-off { background:#c0392b; color:#fff; border:none; border-radius:3px; padding:2px 6px; font-size:9.5px; cursor:pointer; font-weight:500; }
  .btn-on:hover,.btn-off:hover { opacity:.85!important; }
  .footer { text-align:center; color:#444; font-size:10px; margin-top:8px; font-family:monospace; }
</style>
</head>
<body>
<div class="container">

<!-- APP WINDOW -->
<div class="app-win">
  <div class="titlebar">
    <button class="win-btn win-close"></button>
    <button class="win-btn win-min"></button>
    <button class="win-btn win-max"></button>
    <span>Modbus IO Monitor &amp; Control — Waveshare RTU IO 8CH</span>
  </div>
  <div class="conn-bar">
    <label>IP:</label><input value="10.10.10.10" readonly/>
    <label>Port:</label><input class="sm" value="502" readonly/>
    <label>Slave ID:</label><input class="sm" value="1" readonly/>
    <button class="btn-connect">Connect</button>
    <span class="status-dot"></span><span class="status-txt">Connected</span>
  </div>
  <div class="panels">
    <div class="panel">
      <div class="panel-title">Digital Inputs (FC02 — read only)</div>
      <div id="di-rows"></div>
    </div>
    <div class="panel">
      <div class="panel-title">Digital Outputs (FC05 — write / FC01 — read state)</div>
      <div id="do-rows"></div>
    </div>
  </div>
</div>

<script>
const doLedIds = [null,'m-do1','m-do2','m-do3','m-do4','m-do5','m-do6','m-do7','m-do8'];
const diLedIds = [null,'m-di1','m-di2','m-di3','m-di4','m-di5','m-di6','m-di7','m-di8'];
const doColors = { 6:'#e74c3c', 7:'#2ecc71', 8:'#3498db' };
const lightIds = { 6:'light-do6', 7:'light-do7', 8:'light-do8' };
const lightOnColors  = { 6:'#c0392b', 7:'#27ae60', 8:'#2980b9' };
const lightOffColors = { 6:'#2a0a0a', 7:'#0a2a0a', 8:'#0a0a2a' };

function setModuleLed(id, on, color) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.fill = on ? color : '#1a3a1a';
  el.style.stroke = on ? '#1a7040' : '#0d1f0d';
  el.style.filter = on ? 'drop-shadow(0 0 4px '+color+')' : 'none';
}
function setLight(ch, on) {
  const el = document.getElementById(lightIds[ch]);
  if (!el) return;
  el.style.fill = on ? lightOnColors[ch] : lightOffColors[ch];
  el.style.filter = on ? 'drop-shadow(0 0 8px '+lightOnColors[ch]+')' : 'none';
}
function toggleDO(ch, on) {
  const color = doColors[ch] || '#2ecc71';
  setModuleLed(doLedIds[ch], on, color);
  if (lightIds[ch]) setLight(ch, on);
  const ledSq = document.getElementById('do-led-'+ch);
  const stTxt = document.getElementById('do-txt-'+ch);
  const btnOn  = document.getElementById('do-on-'+ch);
  const btnOff = document.getElementById('do-off-'+ch);
  if (ledSq) ledSq.classList.toggle('on', on);
  if (stTxt) { stTxt.textContent = on?'ON':'OFF'; stTxt.classList.toggle('on', on); }
  if (btnOn)  btnOn.style.opacity  = on ? '1' : '0.4';
  if (btnOff) btnOff.style.opacity = on ? '0.4' : '1';
}
const diState = {};
function pressDI(ch) {
  diState[ch] = !diState[ch];
  const on = diState[ch];
  setModuleLed(diLedIds[ch], on, '#2ecc71');
  const face = document.getElementById('btn-di'+ch+'-face');
  if (face) { face.style.fill = on ? '#27ae60' : '#3d5166'; face.style.stroke = on ? '#1a7040' : '#5d7080'; }
  const ledSq = document.getElementById('di-led-'+ch);
  const stTxt = document.getElementById('di-txt-'+ch);
  if (ledSq) ledSq.classList.toggle('on', on);
  if (stTxt) { stTxt.textContent = on?'ON':'OFF'; stTxt.classList.toggle('on', on); }
}
function buildDI() {
  const div = document.getElementById('di-rows');
  for (let i=1; i<=8; i++) {
    const row = document.createElement('div');
    row.className = 'ch-row';
    const extra = i<=3 ? `<span style="font-size:9px;color:#555;margin-left:4px;">← tlačidlo</span>` : '';
    row.innerHTML = `<span class="ch-label">DI ${i}</span><div class="led-sq" id="di-led-${i}"></div><span class="state-txt" id="di-txt-${i}">OFF</span>${extra}`;
    div.appendChild(row);
  }
}
function buildDO() {
  const div = document.getElementById('do-rows');
  const colors = { 6:'#e74c3c', 7:'#27ae60', 8:'#2980b9' };
  for (let i=1; i<=8; i++) {
    const row = document.createElement('div');
    row.className = 'ch-row';
    const dot = colors[i] ? `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${colors[i]};margin-left:2px;"></span>` : '';
    row.innerHTML = `<span class="ch-label">DO ${i}</span><div class="led-sq" id="do-led-${i}"></div><span class="state-txt" id="do-txt-${i}">OFF</span><button class="btn-on" id="do-on-${i}" onclick="toggleDO(${i},true)">ON</button><button class="btn-off" id="do-off-${i}" onclick="toggleDO(${i},false)">OFF</button>${dot}`;
    div.appendChild(row);
  }
}
buildDI(); buildDO();
for (let i=1;i<=8;i++) { setModuleLed(doLedIds[i],false,'#2ecc71'); setModuleLed(diLedIds[i],false,'#2ecc71'); }
</script>
